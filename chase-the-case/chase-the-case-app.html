<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="theme-color" content="#4283cc">
<meta name="description" content="Chase the Case — jornada gamificada de hematologia (HORIBA Yumizen + CellaVision). Arquivo único, abre offline.">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Chase the Case · Jornada de Hematologia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* =============================================================================
   Chase the Case — Jornada de Hematologia
   Tema CLARO, alinhado à identidade visual HORIBA (azul #4283cc, base branca,
   estética clínica/corporativa). Layout original — não usa logos/imagens da marca.
   Mobile-first, self-contained.
   ============================================================================= */

:root {
  /* base — clinical light */
  --bg:        #eaf0f7;
  --bg-soft:   #f4f7fb;
  --surface:   #ffffff;
  --surface-2: #eef3f9;
  --line:      #d9e2ee;
  --line-soft: #e9eff6;

  --txt:       #112138;
  --txt-dim:   #4d5e78;
  --txt-mute:  #8595ab;

  /* HORIBA blue family */
  --brand:     #4283cc;   /* cor oficial HORIBA */
  --brand-d:   #2f6fb8;   /* mais escura p/ contraste em branco */
  --brand-dd:  #1f5394;   /* headers / banner */
  --accent:    #2f6fb8;   /* alias usado pela engine */
  --accent-2:  #5aa0e0;

  --gold:      #b9770a;   /* âmbar legível em branco (XP/streak) */
  --good:      #18895f;
  --bad:       #d23b4a;
  --violet:    #6b4ee6;

  --r-sm: 10px;
  --r:    14px;
  --r-lg: 20px;
  --r-xl: 26px;

  --shadow:    0 1px 2px rgba(16,33,56,.04), 0 8px 24px -14px rgba(31,83,148,.28);
  --shadow-lg: 0 18px 50px -20px rgba(31,83,148,.4);
  --glow:      0 0 0 1px rgba(66,131,204,.18), 0 10px 26px -12px rgba(66,131,204,.45);

  --ff: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  --maxw: 480px;
  --safe-b: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { -webkit-text-size-adjust: 100%; }

body {
  font-family: var(--ff);
  background:
    radial-gradient(1100px 520px at 50% -8%, #dceaf8 0%, transparent 60%),
    var(--bg);
  color: var(--txt);
  min-height: 100vh;
  line-height: 1.5;
  overflow-x: hidden;
}

/* App frame ----------------------------------------------------------------- */
#app {
  max-width: var(--maxw);
  margin: 0 auto;
  min-height: 100vh;
  position: relative;
  padding-bottom: calc(92px + var(--safe-b));
  background: var(--bg);
  box-shadow: 0 0 60px -30px rgba(31,83,148,.35);
}

/* Top bar ------------------------------------------------------------------- */
.topbar {
  position: sticky; top: 0; z-index: 40;
  display: flex; align-items: center; gap: 12px;
  padding: 13px 18px;
  background: rgba(255,255,255,.86);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--line);
}
.brand { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
.brand .dot {
  width: 32px; height: 32px; border-radius: 9px; flex: none;
  background: linear-gradient(150deg, var(--brand), var(--brand-dd));
  box-shadow: var(--glow);
  display: grid; place-items: center; font-size: 16px;
}
.brand b { font-size: 15px; letter-spacing: -.2px; color: var(--txt); }
.brand small { display: block; font-size: 10px; color: var(--brand-d); letter-spacing: .08em; text-transform: uppercase; font-weight: 700; }

.xp-chip {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface-2); border: 1px solid var(--line);
  padding: 6px 11px; border-radius: 999px; font-size: 12.5px; font-weight: 700; color: var(--txt);
}
.xp-chip .lv { color: var(--brand-d); }
.xp-chip .flame { font-size: 13px; }

/* Generic ------------------------------------------------------------------- */
.screen { padding: 8px 18px 8px; animation: fade .32s ease both; }
@keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

.eyebrow { font-size: 11px; letter-spacing: .12em; text-transform: uppercase; color: var(--brand-d); font-weight: 800; }
.h1 { font-size: 25px; font-weight: 800; letter-spacing: -.5px; margin: 4px 0 6px; line-height: 1.12; color: var(--txt); }
.lead { color: var(--txt-dim); font-size: 14px; }

.pill { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 700;
  padding: 4px 9px; border-radius: 999px; background: var(--surface-2); border: 1px solid var(--line); color: var(--txt-dim); }

/* Progress bar -------------------------------------------------------------- */
.xpbar { height: 8px; border-radius: 999px; background: var(--surface-2); overflow: hidden; border: 1px solid var(--line); }
.xpbar > i { display: block; height: 100%; border-radius: 999px;
  background: linear-gradient(90deg, var(--brand), var(--accent-2)); transition: width .6s cubic-bezier(.22,1,.36,1); }

/* Hero (home) — HORIBA blue banner ------------------------------------------ */
.hero {
  margin: 10px 0 18px; padding: 22px 20px; border-radius: var(--r-xl);
  background:
    radial-gradient(120% 140% at 100% 0%, rgba(255,255,255,.16), transparent 55%),
    linear-gradient(155deg, var(--brand) 0%, var(--brand-dd) 100%);
  color: #fff; box-shadow: var(--shadow); position: relative; overflow: hidden;
}
.hero::after { content:""; position:absolute; inset:0;
  background-image: radial-gradient(circle at 1px 1px, rgba(255,255,255,.10) 1px, transparent 0);
  background-size: 18px 18px; pointer-events:none; opacity:.5; }
.hero .eyebrow { color: rgba(255,255,255,.85); position: relative; }
.hero h2 { font-size: 22px; font-weight: 800; letter-spacing: -.4px; line-height: 1.16; position: relative; margin-top: 6px; }
.hero p { color: rgba(255,255,255,.9); font-size: 13.5px; margin-top: 9px; position: relative; }
.hero .stats { display: flex; gap: 8px; margin-top: 18px; position: relative; }
.hero .stat { flex: 1; background: rgba(255,255,255,.14); border: 1px solid rgba(255,255,255,.22); border-radius: var(--r); padding: 11px 12px; backdrop-filter: blur(4px); }
.hero .stat b { font-size: 19px; display: block; color: #fff; }
.hero .stat span { font-size: 10px; color: rgba(255,255,255,.8); text-transform: uppercase; letter-spacing: .05em; }
.hero .xpbar { background: rgba(255,255,255,.22); border-color: rgba(255,255,255,.25); position: relative; }
.hero .xpbar > i { background: #fff; }

/* Section heading ----------------------------------------------------------- */
.sec-head { display: flex; align-items: baseline; justify-content: space-between; margin: 22px 2px 12px; }
.sec-head h3 { font-size: 16px; font-weight: 800; letter-spacing: -.2px; color: var(--txt); }
.sec-head span { font-size: 12px; color: var(--txt-mute); }

/* Track cards (journey) ----------------------------------------------------- */
.track {
  display: flex; align-items: center; gap: 14px; width: 100%; text-align: left;
  background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg);
  padding: 15px; margin-bottom: 12px; cursor: pointer; color: inherit; box-shadow: var(--shadow);
  transition: transform .15s ease, border-color .2s ease, box-shadow .2s ease;
}
.track:active { transform: scale(.985); }
.track .ico { width: 50px; height: 50px; flex: none; border-radius: 15px; display: grid; place-items: center;
  font-size: 24px; background: var(--surface-2); border: 1px solid var(--line); }
.track .meta { flex: 1; min-width: 0; }
.track .meta b { font-size: 15px; display: block; letter-spacing: -.2px; color: var(--txt); }
.track .meta p { font-size: 12px; color: var(--txt-mute); margin-top: 2px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.track .prog { display: flex; align-items: center; gap: 8px; margin-top: 9px; }
.track .prog .xpbar { flex: 1; height: 6px; }
.track .prog small { font-size: 11px; color: var(--txt-dim); font-weight: 700; white-space: nowrap; }
.track .chev { color: var(--txt-mute); font-size: 22px; flex: none; }

/* Case list inside track ---------------------------------------------------- */
.case-card {
  position: relative; width: 100%; text-align: left; color: inherit; cursor: pointer;
  background: var(--surface);
  border: 1px solid var(--line); border-radius: var(--r-lg);
  padding: 16px 16px 15px; margin-bottom: 13px; overflow: hidden; box-shadow: var(--shadow);
  transition: transform .15s ease, box-shadow .2s ease, border-color .2s;
}
.case-card:active { transform: scale(.985); }
.case-card .ribbon { position: absolute; top: 0; left: 0; height: 100%; width: 5px; }
.case-card .row1 { display: flex; align-items: center; gap: 10px; }
.case-card .num { font-size: 11px; font-weight: 800; letter-spacing: .06em; color: var(--brand-d);
  background: rgba(66,131,204,.1); border: 1px solid rgba(66,131,204,.22); padding: 3px 8px; border-radius: 7px; }
.case-card h4 { font-size: 17px; font-weight: 800; letter-spacing: -.3px; margin: 10px 0 4px; line-height: 1.2; color: var(--txt); }
.case-card .ctx { font-size: 12.5px; color: var(--txt-dim);
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.case-card .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
.tag-eq { font-size: 10.5px; font-weight: 600; color: var(--txt-dim);
  background: var(--surface-2); border: 1px solid var(--line); padding: 3px 8px; border-radius: 6px; }
.status-dot { margin-left: auto; font-size: 11px; font-weight: 800; padding: 4px 9px; border-radius: 999px; }
.status-dot.done { color: var(--good); background: rgba(24,137,95,.1); border: 1px solid rgba(24,137,95,.26); }
.status-dot.new  { color: var(--gold); background: rgba(185,119,10,.1); border: 1px solid rgba(185,119,10,.24); }
.diff { display: inline-flex; gap: 2px; }
.diff i { width: 6px; height: 6px; border-radius: 999px; background: var(--line); }
.diff i.on { background: var(--gold); }

/* Case study screen --------------------------------------------------------- */
.cs-hero { border-radius: var(--r-xl); padding: 20px; margin: 8px 0 16px;
  background: linear-gradient(155deg, var(--brand), var(--brand-dd)); color: #fff; box-shadow: var(--shadow); }
.cs-hero .num { font-size: 11px; font-weight: 800; letter-spacing: .08em; color: rgba(255,255,255,.85); }
.cs-hero h2 { font-size: 24px; font-weight: 800; letter-spacing: -.5px; margin: 6px 0 10px; line-height: 1.12; color: #fff; }
.cs-hero .ctx { font-size: 14px; color: rgba(255,255,255,.92); }
.cs-hero .tag-eq { color: #fff; background: rgba(255,255,255,.16); border-color: rgba(255,255,255,.25); }
.cs-hero small { color: rgba(255,255,255,.85) !important; }
.cs-hero .xpbar { background: rgba(255,255,255,.22); border-color: rgba(255,255,255,.25); }
.cs-hero .xpbar > i { background: #fff !important; }

.block { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg);
  padding: 16px; margin-bottom: 13px; box-shadow: var(--shadow); }
.block > .bt { display: flex; align-items: center; gap: 9px; font-size: 13px; font-weight: 800;
  letter-spacing: .01em; margin-bottom: 12px; color: var(--txt); }
.block > .bt .bi { width: 26px; height: 26px; border-radius: 8px; display: grid; place-items: center;
  background: var(--surface-2); border: 1px solid var(--line); font-size: 14px; }

/* asset placeholder slot (drop official HORIBA image here) */
.asset-slot { border: 1.5px dashed var(--line); border-radius: var(--r); padding: 18px 14px;
  text-align: center; color: var(--txt-mute); font-size: 11.5px; background: var(--bg-soft); }
.asset-slot.has-img { border-style: solid; padding: 0; overflow: hidden; }
.asset-slot img { width: 100%; display: block; }
.asset-slot .ph-ic { font-size: 22px; display: block; margin-bottom: 6px; opacity: .55; }

/* param table */
.params { display: flex; flex-direction: column; gap: 9px; }
.param { display: flex; align-items: center; gap: 11px; }
.param .nm { font-size: 13px; font-weight: 700; width: 96px; flex: none; color: var(--txt); }
.param .tr { width: 26px; height: 26px; border-radius: 7px; display: grid; place-items: center; font-size: 14px; font-weight: 800; flex: none; }
.param .tr.up { color: var(--bad); background: rgba(210,59,74,.1); }
.param .tr.down { color: var(--brand-d); background: rgba(66,131,204,.12); }
.param .tr.flat { color: var(--txt-mute); background: var(--surface-2); }
.param .note { font-size: 12px; color: var(--txt-dim); }

/* flags / chips list */
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.flag-chip { font-size: 12px; font-weight: 700; color: var(--gold);
  background: rgba(185,119,10,.09); border: 1px solid rgba(185,119,10,.24); padding: 6px 11px; border-radius: 9px; }
.morph-li { display: flex; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--line-soft); font-size: 13.5px; color: var(--txt-dim); }
.morph-li:last-child { border-bottom: 0; }
.morph-li::before { content: "🔬"; flex: none; }

.learn { font-size: 14px; line-height: 1.6; color: var(--txt); }
.learn-box { background: linear-gradient(180deg, rgba(66,131,204,.07), var(--surface)); border-color: rgba(66,131,204,.28); }

/* Buttons ------------------------------------------------------------------- */
.btn { display: flex; align-items: center; justify-content: center; gap: 9px; width: 100%;
  border: none; cursor: pointer; font-family: inherit; font-weight: 800; font-size: 15px;
  padding: 16px; border-radius: var(--r); color: #fff;
  background: linear-gradient(180deg, var(--brand), var(--brand-d));
  box-shadow: 0 10px 24px -12px rgba(31,83,148,.7); transition: transform .12s ease, filter .2s; }
.btn:active { transform: scale(.98); }
.btn.ghost { background: var(--surface); color: var(--txt); border: 1px solid var(--line); box-shadow: var(--shadow); }
.btn.lg { font-size: 16px; padding: 17px; }
.btn[disabled] { opacity: .45; pointer-events: none; }

.backlink { display: inline-flex; align-items: center; gap: 7px; color: var(--brand-d);
  font-size: 13px; font-weight: 700; padding: 8px 0; cursor: pointer; background: none; border: none; font-family: inherit; }

/* Quiz ---------------------------------------------------------------------- */
.quiz-top { display: flex; align-items: center; gap: 10px; margin: 6px 0 18px; }
.quiz-top .xpbar { flex: 1; }
.quiz-top small { font-size: 12px; font-weight: 700; color: var(--txt-dim); white-space: nowrap; }
.q-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-xl);
  padding: 22px 18px; box-shadow: var(--shadow); }
.q-card .qn { font-size: 11px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; color: var(--brand-d); }
.q-card .qq { font-size: 19px; font-weight: 800; letter-spacing: -.3px; line-height: 1.3; margin: 8px 0 20px; color: var(--txt); }
.opt { display: flex; align-items: center; gap: 12px; width: 100%; text-align: left; cursor: pointer;
  font-family: inherit; font-size: 14.5px; font-weight: 600; color: var(--txt);
  background: var(--bg-soft); border: 1.5px solid var(--line); border-radius: var(--r);
  padding: 15px; margin-bottom: 11px; transition: border-color .15s, background .15s, transform .1s; }
.opt:active { transform: scale(.99); }
.opt .key { width: 26px; height: 26px; border-radius: 8px; flex: none; display: grid; place-items: center;
  font-size: 13px; font-weight: 800; background: var(--surface-2); border: 1px solid var(--line); color: var(--txt-dim); }
.opt.correct { border-color: var(--good); background: rgba(24,137,95,.09); }
.opt.correct .key { background: var(--good); color: #fff; border-color: var(--good); }
.opt.wrong { border-color: var(--bad); background: rgba(210,59,74,.09); }
.opt.wrong .key { background: var(--bad); color: #fff; border-color: var(--bad); }
.opt[disabled] { cursor: default; }

.explain { margin-top: 4px; border-radius: var(--r); padding: 15px; font-size: 13.5px; line-height: 1.55;
  background: var(--surface-2); border: 1px solid var(--line); color: var(--txt); animation: fade .3s ease both; }
.explain b { color: var(--brand-d); }
.explain.ok b { color: var(--good); }
.explain.no b { color: var(--bad); }

/* Result -------------------------------------------------------------------- */
.result { text-align: center; padding: 26px 18px; }
.result .badge { width: 110px; height: 110px; margin: 6px auto 18px; border-radius: 50%;
  display: grid; place-items: center; font-size: 52px; position: relative;
  background: radial-gradient(circle at 50% 35%, #fff, var(--surface-2)); border: 1px solid var(--line);
  box-shadow: var(--glow); }
.result h2 { font-size: 26px; font-weight: 800; letter-spacing: -.5px; color: var(--txt); }
.result .sub { color: var(--txt-dim); font-size: 14px; margin-top: 6px; }
.result .score { font-size: 46px; font-weight: 800; margin: 18px 0 4px;
  background: linear-gradient(90deg, var(--brand), var(--brand-dd)); -webkit-background-clip: text; background-clip: text; color: transparent; }
.result .rewards { display: flex; gap: 10px; margin: 22px 0; }
.result .reward { flex: 1; background: var(--surface); border: 1px solid var(--line); border-radius: var(--r); padding: 14px 10px; box-shadow: var(--shadow); }
.result .reward b { display: block; font-size: 20px; color: var(--gold); }
.result .reward span { font-size: 11px; color: var(--txt-mute); }

/* Bottom nav ---------------------------------------------------------------- */
.tabbar { position: fixed; left: 50%; transform: translateX(-50%); bottom: 0; z-index: 50;
  width: 100%; max-width: var(--maxw);
  display: flex; padding: 8px 14px calc(8px + var(--safe-b));
  background: linear-gradient(180deg, transparent, rgba(234,240,247,.95) 35%); }
.tabbar .inner { display: flex; flex: 1; background: var(--surface); border: 1px solid var(--line);
  border-radius: 18px; padding: 6px; box-shadow: var(--shadow-lg); }
.tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer;
  background: none; border: none; font-family: inherit; color: var(--txt-mute); padding: 8px 4px; border-radius: 13px;
  font-size: 10px; font-weight: 700; transition: color .15s, background .15s; }
.tab .ti { font-size: 19px; }
.tab.active { color: var(--brand-d); background: var(--surface-2); }

/* About / sources ----------------------------------------------------------- */
.note-card { border-left: 3px solid var(--brand); background: rgba(66,131,204,.06);
  padding: 14px 16px; border-radius: 0 var(--r) var(--r) 0; font-size: 13px; color: var(--txt-dim); line-height: 1.55; margin-bottom: 12px; }
.note-card b { color: var(--txt); }
.src-li { display: block; padding: 12px 14px; background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--r); margin-bottom: 9px; color: var(--txt); text-decoration: none; font-size: 13px; box-shadow: var(--shadow); }
.src-li b { color: var(--brand-d); }
.src-li small { display: block; color: var(--txt-mute); font-size: 11px; margin-top: 3px; word-break: break-all; }

/* deck / collection grid ---------------------------------------------------- */
.deck-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 11px; }
.mini { aspect-ratio: 3/4; border-radius: var(--r); padding: 13px; display: flex; flex-direction: column;
  border: 1px solid var(--line); background: var(--surface); cursor: pointer; box-shadow: var(--shadow);
  position: relative; overflow: hidden; transition: transform .15s; }
.mini:active { transform: scale(.97); }
.mini.locked { opacity: .6; background: var(--bg-soft); }
.mini .num { font-size: 10px; font-weight: 800; color: var(--brand-d); letter-spacing: .06em; }
.mini h5 { font-size: 13px; font-weight: 800; margin-top: auto; line-height: 1.2; letter-spacing: -.2px; color: var(--txt); }
.mini .emoji { font-size: 26px; }
.mini .seal { position: absolute; top: 10px; right: 10px; font-size: 14px; }

.empty { text-align: center; color: var(--txt-mute); padding: 40px 20px; font-size: 13px; }

hr.sep { border: none; border-top: 1px solid var(--line); margin: 18px 0; }

/* toast */
#toast { position: fixed; left: 50%; bottom: calc(96px + var(--safe-b)); transform: translateX(-50%) translateY(20px);
  background: var(--txt); border: 1px solid var(--txt); color: #fff; font-size: 13px; font-weight: 700;
  padding: 11px 18px; border-radius: 999px; box-shadow: var(--shadow-lg); opacity: 0; pointer-events: none;
  transition: all .3s cubic-bezier(.22,1,.36,1); z-index: 80; max-width: 90%; }
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: .001ms !important; transition-duration: .001ms !important; }
}

</style>
</head>
<body>
<main id="app"><div id="app-root"></div></main>
<div id="toast"></div>
<script>
/* =============================================================================
   cases.js — Conteúdo educacional do "Chase the Case Game"

   IMPORTANTE — PROVENIÊNCIA DO CONTEÚDO
   -------------------------------------
   • O índice de casos (número + patologia + equipamento) é REAL e verificado a
     partir das publicações públicas da HORIBA Medical ("Chase the Case").
   • O conteúdo de ensino (morfologia, flags, parâmetros, achados de lâmina) é
     uma SÍNTESE EDUCACIONAL ORIGINAL baseada em hematologia laboratorial
     consolidada, alinhada à patologia de cada caso real.
   • NÃO reproduzimos os números exatos de paciente, as imagens de histograma/
     matriz, nem as fotos de lâmina dos PDFs oficiais (material protegido).
     Cada caso tem `assets` vazios e campos `realData:false` — preencha com os
     ativos oficiais da HORIBA (ver CONTENT-SOURCES.md).
   • Os valores de CBC mostrados como "padrão típico" são FAIXAS DIDÁTICAS da
     literatura, marcados como tal — não são o laudo do paciente real.
   ============================================================================= */

window.CHASE_TRACKS = [
  {
    id: 'fundamentos',
    nome: 'Fundamentos do Laboratório',
    emoji: '🧪',
    cor: '#2f6fb8',
    descricao: 'Como o analisador "enxerga" o sangue: histogramas, matriz LMNE, flags e a lâmina no CellaVision.',
  },

    fonte: 'https://www.horiba.com/usa/healthcare/news/news-press-release/detail/news/2/2023/lung-cancer-clinical-cases-of-yumizen-h2500-hematology-analyzers-chase-the-case-18/',
  },
];

</script>
<script>
/* =============================================================================
   app.js — engine do Chase the Case Game (vanilla JS, sem build)
   ============================================================================= */
(function () {
  'use strict';

  var TRACKS = window.CHASE_TRACKS || [];
  var CASES = window.CHASE_CASES || [];
  var EQ = window.CHASE_EQUIPAMENTOS || {};
  var byId = {};
  CASES.forEach(function (c) { byId[c.id] = c; });

  /* ---- estado persistido ------------------------------------------------- */
  var SKEY = 'chase_state_v1';
  var state = load();
  function load() {
    try {
      var s = JSON.parse(localStorage.getItem(SKEY));
      if (s && s.done) return s;
    } catch (e) {}
    return { xp: 0, streak: 0, lastDay: null, done: {} /* caseId: {best, mastered} */ };
  }
  function save() { try { localStorage.setItem(SKEY, JSON.stringify(state)); } catch (e) {} }

  function level() { return Math.floor(state.xp / 100) + 1; }
  function levelProgress() { return state.xp % 100; }
  function totalCases() { return CASES.length; }
  function masteredCount() { return Object.keys(state.done).filter(function (k) { return state.done[k] && state.done[k].mastered; }).length; }

  function casesOfTrack(tid) { return CASES.filter(function (c) { return c.track === tid; }); }
  function trackProgress(tid) {
    var cs = casesOfTrack(tid), m = 0;
    cs.forEach(function (c) { if (state.done[c.id] && state.done[c.id].mastered) m++; });
    return { mastered: m, total: cs.length, pct: cs.length ? Math.round((m / cs.length) * 100) : 0 };
  }

  function bumpStreak() {
    var today = new Date().toISOString().slice(0, 10);
    if (state.lastDay === today) return;
    var y = new Date(Date.now() - 864e5).toISOString().slice(0, 10);
    state.streak = (state.lastDay === y) ? state.streak + 1 : 1;
    state.lastDay = today;
  }

  /* ---- helpers ----------------------------------------------------------- */
  var app = document.getElementById('app-root');
  function h(html) { return html; }
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (m) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' })[m]; }); }
  function trackById(id) { for (var i = 0; i < TRACKS.length; i++) if (TRACKS[i].id === id) return TRACKS[i]; return null; }

  function toast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(t._t); t._t = setTimeout(function () { t.classList.remove('show'); }, 1900);
  }

  function trendClass(t) { return t === '↑' ? 'up' : t === '↓' ? 'down' : 'flat'; }

  /* ---- router ------------------------------------------------------------ */
  var route = { name: 'home', param: null };
  function go(name, param) {
    route = { name: name, param: param };
    window.scrollTo(0, 0);
    render();
    try { history.replaceState(null, '', '#' + name + (param ? '/' + param : '')); } catch (e) {}
  }

  /* ---- top bar ----------------------------------------------------------- */
  function topbar() {
    return '' +
      '<div class="topbar">' +
        '<div class="brand">' +
          '<div class="dot">🩸</div>' +
          '<div><b>Chase the Case</b><small>Jornada de Hematologia</small></div>' +
        '</div>' +
        '<div class="xp-chip"><span class="flame">🔥</span>' + state.streak + '<span class="lv">· Nv ' + level() + '</span></div>' +
      '</div>';
  }

  /* ---- tab bar ----------------------------------------------------------- */
  function tabbar() {
    var tabs = [
      { id: 'home', ic: '🗺️', label: 'Jornada' },
      { id: 'deck', ic: '🃏', label: 'Coleção' },
      { id: 'about', ic: 'ℹ️', label: 'Sobre' },
    ];
    var active = (route.name === 'home' || route.name === 'track' || route.name === 'case' || route.name === 'quiz' || route.name === 'result') ? 'home'
      : route.name === 'deck' ? 'deck' : route.name === 'about' ? 'about' : 'home';
    return '<div class="tabbar"><div class="inner">' + tabs.map(function (t) {
      return '<button class="tab ' + (active === t.id ? 'active' : '') + '" data-tab="' + t.id + '">' +
        '<span class="ti">' + t.ic + '</span>' + t.label + '</button>';
    }).join('') + '</div></div>';
  }

  /* ---- HOME -------------------------------------------------------------- */
  function viewHome() {
    var lp = levelProgress();
    var s = '<div class="screen">';
    s += '<div class="hero">' +
        '<div class="eyebrow">Estudo gamificado · casos reais HORIBA</div>' +
        '<h2>Resolva o caso. Leia a lâmina. Vire especialista.</h2>' +
        '<p>Cada carta é um caso clínico real da série Chase the Case. Decifre os flags do analisador, a matriz, os parâmetros e a morfologia no CellaVision — e avance pelas trilhas.</p>' +
        '<div class="stats">' +
          '<div class="stat"><b>' + masteredCount() + '/' + totalCases() + '</b><span>Casos dominados</span></div>' +
          '<div class="stat"><b>Nv ' + level() + '</b><span>' + lp + '/100 XP</span></div>' +
          '<div class="stat"><b>🔥 ' + state.streak + '</b><span>Sequência</span></div>' +
        '</div>' +
        '<div style="margin-top:14px" class="xpbar"><i style="width:' + lp + '%"></i></div>' +
      '</div>';

    s += '<div class="sec-head"><h3>Trilhas de conhecimento</h3><span>' + TRACKS.length + ' trilhas</span></div>';
    TRACKS.forEach(function (t) {
      var p = trackProgress(t.id);
      s += '<button class="track" data-track="' + t.id + '">' +
        '<div class="ico" style="color:' + t.cor + '">' + t.emoji + '</div>' +
        '<div class="meta"><b>' + esc(t.nome) + '</b><p>' + esc(t.descricao) + '</p>' +
          '<div class="prog"><div class="xpbar"><i style="width:' + p.pct + '%;background:' + t.cor + '"></i></div>' +
          '<small>' + p.mastered + '/' + p.total + '</small></div>' +
        '</div><div class="chev">›</div></button>';
    });

    s += '<hr class="sep"><div class="note-card">⚕️ <b>Material de estudo.</b> Conteúdo educacional baseado nos casos públicos da HORIBA Medical. Não substitui laudo, diretriz clínica ou os PDFs oficiais. Veja a aba <b>Sobre</b>.</div>';
    s += '</div>';
    return s;
  }

  /* ---- TRACK ------------------------------------------------------------- */
  function viewTrack(tid) {
    var t = trackById(tid); if (!t) return viewHome();
    var cs = casesOfTrack(tid);
    var p = trackProgress(tid);
    var s = '<div class="screen">';
    s += '<button class="backlink" data-go="home">‹ Jornada</button>';
    s += '<div class="cs-hero" style="background:radial-gradient(120% 120% at 0 0,' + hexA(t.cor, .18) + ',transparent 55%),var(--surface)">' +
        '<div class="num" style="color:' + t.cor + '">' + t.emoji + ' TRILHA</div>' +
        '<h2>' + esc(t.nome) + '</h2><div class="ctx">' + esc(t.descricao) + '</div>' +
        '<div class="prog" style="margin-top:14px;display:flex;align-items:center;gap:8px">' +
          '<div class="xpbar" style="flex:1"><i style="width:' + p.pct + '%;background:' + t.cor + '"></i></div>' +
          '<small style="font-size:11px;font-weight:700;color:var(--txt-dim)">' + p.mastered + '/' + p.total + ' dominados</small>' +
        '</div></div>';

    s += '<div class="sec-head"><h3>Casos</h3><span>' + cs.length + ' cartas</span></div>';
    cs.forEach(function (c) {
      var d = state.done[c.id];
      var status = d && d.mastered ? '<span class="status-dot done">✓ Dominado</span>' : '<span class="status-dot new">Novo</span>';
      var diff = '<span class="diff">' + [1, 2, 3].map(function (n) { return '<i class="' + (n <= c.dificuldade ? 'on' : '') + '"></i>'; }).join('') + '</span>';
      s += '<button class="case-card" data-case="' + c.id + '">' +
        '<div class="ribbon" style="background:' + t.cor + '"></div>' +
        '<div class="row1"><span class="num">CASE #' + esc(c.numero) + '</span>' + diff + status + '</div>' +
        '<h4>' + esc(c.patologia) + '</h4>' +
        '<div class="ctx">' + esc(c.contexto) + '</div>' +
        '<div class="tags">' + (c.equipamento || []).map(function (e) { return '<span class="tag-eq">🔌 ' + esc(e) + '</span>'; }).join('') + '</div>' +
        '</button>';
    });
    s += '</div>';
    return s;
  }

  /* ---- CASE STUDY -------------------------------------------------------- */
  function viewCase(cid) {
    var c = byId[cid]; if (!c) return viewHome();
    var t = trackById(c.track);
    var d = state.done[c.id];
    var s = '<div class="screen">';
    s += '<button class="backlink" data-go="track" data-param="' + c.track + '">‹ ' + esc(t ? t.nome : 'Voltar') + '</button>';

    s += '<div class="cs-hero">' +
        '<div class="num">CASE #' + esc(c.numero) + (d && d.mastered ? ' · ✓ DOMINADO' : '') + '</div>' +
        '<h2>' + esc(c.patologia) + '</h2>' +
        '<div class="ctx">' + esc(c.contexto) + '</div>' +
        '<div class="tags" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:13px">' +
          (c.equipamento || []).map(function (e) { return '<span class="tag-eq">🔌 ' + esc(e) + '</span>'; }).join('') +
        '</div></div>';

    // Pistas do analisador
    if (c.pistas && c.pistas.length) {
      s += block('🔎', 'O que o analisador apontou',
        '<div class="chips" style="flex-direction:column;align-items:stretch;gap:9px">' +
        c.pistas.map(function (p) {
          return '<div style="display:flex;gap:10px;font-size:13.5px;color:var(--txt-dim);line-height:1.5">' +
            '<span style="color:var(--accent);flex:none">➤</span><span>' + esc(p) + '</span></div>';
        }).join('') + '</div>');
    }

    // Matriz / asset slot
    s += block('🧭', 'Matriz & Histograma',
      assetSlot(c.assets && c.assets.matriz, 'Matriz LMNE / dispersão') +
      '<p style="font-size:13px;color:var(--txt-dim);line-height:1.55;margin-top:12px">' + esc(c.histograma) + '</p>');

    // Parâmetros
    if (c.parametros && c.parametros.length) {
      s += block('📊', 'Parâmetros-chave <span style="font-size:10px;font-weight:600;color:var(--txt-mute);margin-left:auto">padrão típico (didático)</span>',
        '<div class="params">' + c.parametros.map(function (p) {
          return '<div class="param"><span class="nm">' + esc(p.nome) + '</span>' +
            '<span class="tr ' + trendClass(p.tendencia) + '">' + esc(p.tendencia) + '</span>' +
            '<span class="note">' + esc(p.nota) + '</span></div>';
        }).join('') + '</div>');
    }

    // Flags
    if (c.flags && c.flags.length) {
      s += block('🚩', 'Flags / Alarmes',
        '<div class="chips">' + c.flags.map(function (f) { return '<span class="flag-chip">⚑ ' + esc(f) + '</span>'; }).join('') + '</div>');
    }

    // CellaVision morphology
    if (c.cellavision && c.cellavision.length) {
      s += block('🔬', 'Lâmina no CellaVision',
        assetSlot(c.assets && c.assets.lamina, 'Imagem de lâmina (CellaVision)') +
        '<div style="margin-top:12px">' + c.cellavision.map(function (m) { return '<div class="morph-li">' + esc(m) + '</div>'; }).join('') + '</div>');
    }

    // Aprendizado
    s += '<div class="block learn-box"><div class="bt"><span class="bi">💡</span>O insight do caso</div>' +
      '<div class="learn">' + esc(c.aprendizado) + '</div></div>';

    // CTA
    var nq = (c.quiz || []).length;
    s += '<button class="btn lg" data-quiz="' + c.id + '">⚡ ' + (d && d.mastered ? 'Refazer desafio' : 'Aceitar o desafio') + ' · ' + nq + ' perguntas</button>';
    if (c.fonte) s += '<div style="text-align:center;margin-top:14px"><a class="backlink" href="' + esc(c.fonte) + '" target="_blank" rel="noopener">Caso oficial HORIBA ↗</a></div>';
    s += '</div>';
    return s;
  }

  function block(ic, title, body) {
    return '<div class="block"><div class="bt"><span class="bi">' + ic + '</span>' + title + '</div>' + body + '</div>';
  }
  function assetSlot(src, label) {
    if (src) return '<div class="asset-slot has-img"><img src="' + esc(src) + '" alt="' + esc(label) + '"></div>';
    return '<div class="asset-slot"><span class="ph-ic">🖼️</span>' + esc(label) + '<br><span style="opacity:.7">imagem oficial — inserir via assets</span></div>';
  }

  /* ---- QUIZ -------------------------------------------------------------- */
  var quizState = null;
  function startQuiz(cid) {
    var c = byId[cid];
    quizState = { cid: cid, i: 0, correct: 0, answered: false, questions: c.quiz || [] };
    go('quiz', cid);
  }
  function viewQuiz() {
    var c = byId[quizState.cid];
    var qs = quizState.questions;
    var q = qs[quizState.i];
    var pct = Math.round((quizState.i / qs.length) * 100);
    var s = '<div class="screen">';
    s += '<button class="backlink" data-case="' + c.id + '">‹ Sair do desafio</button>';
    s += '<div class="quiz-top"><div class="xpbar"><i style="width:' + pct + '%"></i></div>' +
      '<small>' + (quizState.i + 1) + '/' + qs.length + '</small></div>';
    s += '<div class="q-card"><div class="qn">CASE #' + esc(c.numero) + ' · ' + esc(c.patologia) + '</div>' +
      '<div class="qq">' + esc(q.p) + '</div>';
    q.opcoes.forEach(function (o, idx) {
      s += '<button class="opt" data-opt="' + idx + '"><span class="key">' + String.fromCharCode(65 + idx) + '</span>' + esc(o) + '</button>';
    });
    s += '<div id="explain-slot"></div></div>';
    s += '</div>';
    return s;
  }

  function answer(idx) {
    if (quizState.answered) return;
    quizState.answered = true;
    var q = quizState.questions[quizState.i];
    var correct = q.correta;
    var opts = app.querySelectorAll('.opt');
    opts.forEach(function (o, i) {
      o.setAttribute('disabled', '');
      if (i === correct) o.classList.add('correct');
      if (i === idx && idx !== correct) o.classList.add('wrong');
    });
    var ok = idx === correct;
    if (ok) quizState.correct++;
    var slot = document.getElementById('explain-slot');
    slot.innerHTML = '<div class="explain ' + (ok ? 'ok' : 'no') + '">' +
      '<b>' + (ok ? '✓ Acertou!' : '✗ Quase lá.') + '</b> ' + esc(q.explica) +
      '<button class="btn" style="margin-top:14px" id="next-q">' +
      (quizState.i + 1 < quizState.questions.length ? 'Próxima pergunta' : 'Ver resultado') + ' →</button></div>';
    slot.querySelector('#next-q').addEventListener('click', nextQuestion);
    slot.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function nextQuestion() {
    if (quizState.i + 1 < quizState.questions.length) {
      quizState.i++; quizState.answered = false; render();
    } else {
      finishQuiz();
    }
  }

  function finishQuiz() {
    var c = byId[quizState.cid];
    var total = quizState.questions.length;
    var correct = quizState.correct;
    var pct = total ? Math.round((correct / total) * 100) : 0;
    var mastered = pct >= 70;
    var firstMastery = mastered && !(state.done[quizState.cid] && state.done[quizState.cid].mastered);

    var gained = correct * 10 + (mastered ? 20 : 0);
    state.xp += gained;
    var best = Math.max(pct, (state.done[quizState.cid] && state.done[quizState.cid].best) || 0);
    state.done[quizState.cid] = { best: best, mastered: (state.done[quizState.cid] && state.done[quizState.cid].mastered) || mastered };
    if (mastered) bumpStreak();
    save();
    quizState.result = { pct: pct, correct: correct, total: total, gained: gained, mastered: mastered, firstMastery: firstMastery };
    go('result', quizState.cid);
  }

  function viewResult() {
    var c = byId[quizState.cid];
    var r = quizState.result;
    var emoji = r.pct === 100 ? '🏆' : r.mastered ? '🎉' : '📚';
    var title = r.pct === 100 ? 'Caso perfeito!' : r.mastered ? 'Caso dominado!' : 'Continue caçando';
    var sub = r.mastered ? 'Você decifrou ' + esc(c.patologia) + '.' : 'Acerte 70% para dominar a carta. Revise e tente de novo!';
    var s = '<div class="screen"><div class="result">' +
      '<div class="badge">' + emoji + '</div>' +
      '<h2>' + title + '</h2><div class="sub">' + sub + '</div>' +
      '<div class="score">' + r.pct + '%</div>' +
      '<div class="sub">' + r.correct + ' de ' + r.total + ' corretas</div>' +
      '<div class="rewards">' +
        '<div class="reward"><b>+' + r.gained + '</b><span>XP GANHO</span></div>' +
        '<div class="reward"><b>Nv ' + level() + '</b><span>NÍVEL</span></div>' +
        '<div class="reward"><b>🔥 ' + state.streak + '</b><span>SEQUÊNCIA</span></div>' +
      '</div>';
    if (r.firstMastery) s += '<div class="note-card" style="border-color:var(--good);background:rgba(52,211,153,.08);border-left-color:var(--good)">🃏 Nova carta adicionada à sua <b>Coleção</b>!</div>';
    s += '<button class="btn lg" data-quiz="' + c.id + '">↻ Refazer desafio</button>' +
      '<button class="btn ghost" style="margin-top:11px" data-go="track" data-param="' + c.track + '">Voltar à trilha</button>' +
      '<button class="btn ghost" style="margin-top:11px" data-next-case="' + c.id + '">Próximo caso →</button>';
    s += '</div></div>';
    return s;
  }

  function nextCaseAfter(cid) {
    var c = byId[cid];
    var cs = casesOfTrack(c.track);
    var idx = cs.findIndex(function (x) { return x.id === cid; });
    if (idx >= 0 && idx + 1 < cs.length) { go('case', cs[idx + 1].id); return; }
    // próxima trilha
    var ti = TRACKS.findIndex(function (t) { return t.id === c.track; });
    if (ti >= 0 && ti + 1 < TRACKS.length) { go('track', TRACKS[ti + 1].id); return; }
    go('home');
  }

  /* ---- DECK / COLEÇÃO ---------------------------------------------------- */
  function viewDeck() {
    var s = '<div class="screen">';
    s += '<div class="eyebrow">Sua coleção</div><h1 class="h1">Cartas dominadas</h1>' +
      '<p class="lead">Domine um caso (≥70% no desafio) para colecionar a carta.</p>';
    s += '<div style="margin:16px 0" class="hero" ><div class="stats" style="margin-top:0">' +
      '<div class="stat"><b>' + masteredCount() + '</b><span>Colecionadas</span></div>' +
      '<div class="stat"><b>' + totalCases() + '</b><span>Total</span></div>' +
      '<div class="stat"><b>' + Math.round(masteredCount() / totalCases() * 100) + '%</b><span>Completo</span></div>' +
      '</div></div>';
    s += '<div class="deck-grid">';
    CASES.forEach(function (c) {
      var t = trackById(c.track);
      var done = state.done[c.id] && state.done[c.id].mastered;
      s += '<button class="mini ' + (done ? '' : 'locked') + '" data-case="' + c.id + '" style="border-color:' + (done ? hexA(t.cor, .5) : 'var(--line)') + '">' +
        '<div style="display:flex;justify-content:space-between;align-items:start">' +
          '<span class="num">#' + esc(c.numero) + '</span>' +
          '<span class="seal">' + (done ? '✓' : '🔒') + '</span></div>' +
        '<div class="emoji" style="margin-top:8px">' + (t ? t.emoji : '🩸') + '</div>' +
        '<h5>' + esc(c.patologia) + '</h5>' +
        '<small style="font-size:10px;color:var(--txt-mute);margin-top:5px">' + esc(t ? t.nome : '') + '</small>' +
        '</button>';
    });
    s += '</div></div>';
    return s;
  }

  /* ---- ABOUT ------------------------------------------------------------- */
  function viewAbout() {
    var srcSeen = {};
    var sources = [];
    CASES.forEach(function (c) { if (c.fonte && !srcSeen[c.fonte]) { srcSeen[c.fonte] = 1; sources.push(c); } });
    var s = '<div class="screen">';
    s += '<div class="eyebrow">Sobre & Fontes</div><h1 class="h1">Como este estudo foi feito</h1>';
    s += '<div class="note-card">📖 <b>Índice de casos = real.</b> Número, patologia e equipamento (Yumizen H2500/H550/H500, CellaVision DC-1) vêm das publicações públicas da série <b>HORIBA · Chase the Case</b>.</div>';
    s += '<div class="note-card">✍️ <b>Conteúdo de ensino = síntese original.</b> Morfologia, flags, parâmetros e quizzes foram escritos a partir de hematologia laboratorial consolidada, alinhados à patologia de cada caso. Os valores de parâmetros são <b>faixas didáticas</b>, não o laudo do paciente.</div>';
    s += '<div class="note-card">🖼️ <b>Imagens oficiais não incluídas.</b> Histogramas, matrizes e fotos de lâmina dos PDFs da HORIBA são material protegido. Cada caso tem um <b>slot</b> para você inserir o ativo oficial (ver <code>CONTENT-SOURCES.md</code>).</div>';
    s += '<div class="note-card" style="border-left-color:var(--bad);background:rgba(244,63,94,.06)">⚕️ <b>Aviso.</b> Ferramenta de estudo. Não é orientação diagnóstica nem substitui diretrizes, laudos ou os documentos oficiais HORIBA.</div>';

    s += '<div class="sec-head"><h3>Casos oficiais (fontes)</h3><span>' + sources.length + '</span></div>';
    sources.forEach(function (c) {
      s += '<a class="src-li" href="' + esc(c.fonte) + '" target="_blank" rel="noopener">' +
        '<b>Case #' + esc(c.numero) + '</b> · ' + esc(c.patologia) +
        '<small>' + esc(c.fonte) + '</small></a>';
    });

    s += '<hr class="sep"><div style="text-align:center;color:var(--txt-mute);font-size:12px">' +
      'Progresso salvo só no seu aparelho (localStorage).<br>' +
      '<button class="backlink" id="reset-btn" style="color:var(--bad);justify-content:center;width:100%;margin-top:8px">Apagar meu progresso</button></div>';
    s += '</div>';
    return s;
  }

  /* ---- render ------------------------------------------------------------ */
  function render() {
    var v;
    switch (route.name) {
      case 'track': v = viewTrack(route.param); break;
      case 'case': v = viewCase(route.param); break;
      case 'quiz': v = viewQuiz(); break;
      case 'result': v = viewResult(); break;
      case 'deck': v = viewDeck(); break;
      case 'about': v = viewAbout(); break;
      default: v = viewHome();
    }
    var showTop = route.name !== 'quiz' && route.name !== 'result';
    app.innerHTML = (showTop ? topbar() : '') + v + tabbar();
    bindEvents();
  }

  function bindEvents() {
    app.querySelectorAll('[data-tab]').forEach(function (el) {
      el.addEventListener('click', function () { go(el.getAttribute('data-tab')); });
    });
    app.querySelectorAll('[data-track]').forEach(function (el) {
      el.addEventListener('click', function () { go('track', el.getAttribute('data-track')); });
    });
    app.querySelectorAll('[data-case]').forEach(function (el) {
      el.addEventListener('click', function () { go('case', el.getAttribute('data-case')); });
    });
    app.querySelectorAll('[data-go]').forEach(function (el) {
      el.addEventListener('click', function () { go(el.getAttribute('data-go'), el.getAttribute('data-param')); });
    });
    app.querySelectorAll('[data-quiz]').forEach(function (el) {
      el.addEventListener('click', function () { startQuiz(el.getAttribute('data-quiz')); });
    });
    app.querySelectorAll('[data-opt]').forEach(function (el) {
      el.addEventListener('click', function () { answer(parseInt(el.getAttribute('data-opt'), 10)); });
    });
    app.querySelectorAll('[data-next-case]').forEach(function (el) {
      el.addEventListener('click', function () { nextCaseAfter(el.getAttribute('data-next-case')); });
    });
    var rb = document.getElementById('reset-btn');
    if (rb) rb.addEventListener('click', function () {
      if (confirm('Apagar todo o progresso, XP e cartas?')) {
        state = { xp: 0, streak: 0, lastDay: null, done: {} }; save(); toast('Progresso apagado'); go('home');
      }
    });
  }

  /* color helper: hex + alpha -> rgba */
  function hexA(hex, a) {
    hex = (hex || '#2ad0ee').replace('#', '');
    if (hex.length === 3) hex = hex.split('').map(function (x) { return x + x; }).join('');
    var n = parseInt(hex, 16);
    return 'rgba(' + ((n >> 16) & 255) + ',' + ((n >> 8) & 255) + ',' + (n & 255) + ',' + a + ')';
  }

  /* boot */
  (function bootRoute() {
    var hash = (location.hash || '').replace('#', '');
    if (hash) {
      var parts = hash.split('/');
      if (parts[0] === 'track' || parts[0] === 'case' || parts[0] === 'deck' || parts[0] === 'about') {
        route = { name: parts[0], param: parts[1] || null };
      }
    }
    render();
  })();

  window.CHASE = { go: go, state: state };
})();

</script>
</body>
</html>
